set -g base-index 1
set -s escape-time 0
set -g history-limit 20000

set -g mouse on
set -g set-clipboard on
setw -g aggressive-resize on
setw -g monitor-activity on
setw -g mode-keys vi

set -g default-terminal "xterm-256color"
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g allow-passthrough on

set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 80
bind -n MouseDown1StatusRight run-shell "tmux choose-window -Zs; tmux send-keys Right"
bind -n MouseDown1StatusLeft new-window -c "#{pane_current_path}"

bind -n S-Left previous-window
bind -n S-Right next-window

bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind c new-window -a -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; run-shell "~/.local/bin/tmux-apply-theme" \; display-message "tmux config reloaded"
bind ? display-popup -E "~/.local/bin/tmux-help"
run-shell "~/.local/bin/tmux-apply-theme"
set-hook -g client-attached 'run-shell "~/.local/bin/tmux-apply-theme"'
set-hook -g client-session-changed 'run-shell "~/.local/bin/tmux-apply-theme"'
set-hook -g session-created 'run-shell "~/.local/bin/tmux-apply-theme"'
set-hook -g after-new-window 'run-shell "~/.local/bin/tmux-apply-theme"'
set-hook -g after-split-window 'run-shell "~/.local/bin/tmux-apply-theme"'
